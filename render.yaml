services:
  - type: web
    name: northeast-pollution-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: WAQI_TOKEN
        sync: false
      - key: ML_SERVICE_URL
        sync: false
  - type: web
    name: northeast-aqi-ml
    env: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
